name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install pytest
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm --filter @jesdi/skills-cli build
      - run: python3 -m pytest skills/backlog -q
